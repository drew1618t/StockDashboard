<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midnight Glass — Portfolio Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0C0E14;
    --pane: rgba(255,255,255,0.06);
    --pane-hover: rgba(255,255,255,0.10);
    --border-light: rgba(255,255,255,0.08);
    --border-subtle: rgba(255,255,255,0.06);
    --border-faint: rgba(255,255,255,0.04);
    --text-primary: #D6DCE5;
    --text-secondary: #7A8BA5;
    --accent-blue: #8BA4B8;
    --ticker-blue: #8BA4B8;
    --positive: #4ADE80;
    --negative: #F87171;
    --caution: #FBBF24;
  }

  html { font-size: 16px; }

  body {
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    color: var(--text-primary);
    background: var(--bg);
    background-image: radial-gradient(ellipse at 50% 40%, rgba(30, 40, 65, 0.5) 0%, transparent 70%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ─── Header ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border-subtle);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-logo {
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    color: var(--text-primary);
  }

  .header-chip {
    font-weight: 300;
    font-size: 0.75rem;
    color: var(--text-secondary);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 3px 10px;
    letter-spacing: 0.02em;
  }

  .header-nav {
    display: flex;
    gap: 28px;
  }

  .header-nav a {
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text-secondary);
    padding: 18px 0;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    cursor: pointer;
  }

  .header-nav a.active {
    color: var(--text-primary);
    border-bottom-color: rgba(255,255,255,0.2);
  }

  .header-nav a:hover {
    color: var(--text-primary);
  }

  .header-right {
    font-weight: 300;
    font-size: 0.8rem;
    color: var(--text-secondary);
    letter-spacing: 0.03em;
  }

  /* ─── Main ─── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ─── Frosted Pane ─── */
  .frosted-pane {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 32px;
  }

  /* ─── Pane 1: Portfolio Overview ─── */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }

  .overview-metric {
    text-align: center;
    padding: 8px 16px;
    position: relative;
  }

  .overview-metric:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 15%;
    height: 70%;
    width: 1px;
    background: var(--border-subtle);
  }

  .overview-label {
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .overview-value {
    font-size: 1.9rem;
    font-weight: 600;
    line-height: 1;
  }

  .overview-value.positive { color: var(--positive); }

  /* ─── Pane 2: Chart ─── */
  .pane-title {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text-primary);
    margin-bottom: 24px;
    letter-spacing: 0.02em;
  }

  .chart-wrap {
    position: relative;
    height: 300px;
  }

  /* ─── Pane 3: Table ─── */
  .rankings-table {
    width: 100%;
    display: grid;
    grid-template-columns: 80px 1fr 110px 110px 80px 100px;
    row-gap: 0;
  }

  .rankings-table .th,
  .rankings-table .td {
    padding: 12px 8px;
    display: flex;
    align-items: center;
  }

  .rankings-table .th {
    font-size: 0.68rem;
    font-weight: 400;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border-light);
  }

  .rankings-table .td {
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border-faint);
  }

  .rankings-table .row {
    display: contents;
  }

  .rankings-table .row:hover .td {
    background: rgba(255,255,255,0.03);
  }

  .td.ticker {
    color: var(--ticker-blue);
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }

  .td.company {
    font-weight: 300;
    color: var(--text-secondary);
  }

  .td.growth { color: var(--positive); font-weight: 600; }

  .verdict-badge {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 4px;
    display: inline-block;
  }

  .verdict-pass {
    color: var(--positive);
    background: rgba(74, 222, 128, 0.1);
  }

  .verdict-caution {
    color: var(--caution);
    background: rgba(251, 191, 36, 0.1);
  }

  .verdict-fail {
    color: var(--negative);
    background: rgba(248, 113, 113, 0.1);
  }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .overview-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 20px 0;
    }
    .overview-metric:nth-child(2)::after { display: none; }
    .overview-metric:nth-child(1)::after,
    .overview-metric:nth-child(3)::after { display: block; }

    .rankings-table {
      grid-template-columns: 65px 1fr 80px 80px 60px 80px;
      font-size: 0.8rem;
    }

    .header-nav { gap: 16px; }
    .header-nav a { font-size: 0.78rem; }
  }

  @media (max-width: 520px) {
    .header-inner { flex-wrap: wrap; height: auto; padding: 12px 16px; gap: 8px; }
    .header-nav { order: 3; width: 100%; justify-content: center; }
    .rankings-table { grid-template-columns: 55px 1fr 70px 70px 50px 70px; }
    .rankings-table .td, .rankings-table .th { padding: 10px 4px; font-size: 0.72rem; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <span class="header-logo">PORTFOLIO VIZ</span>
      <span class="header-chip">11 holdings</span>
    </div>
    <nav class="header-nav">
      <a class="active">Summary</a>
      <a>Growth</a>
      <a>Valuation</a>
      <a>Profitability</a>
      <a>Deep Dive</a>
    </nav>
    <div class="header-right">Midnight Glass</div>
  </div>
</header>

<!-- Main Content -->
<main class="main">

  <!-- Pane 1: Portfolio Overview -->
  <section class="frosted-pane">
    <div class="overview-grid">
      <div class="overview-metric">
        <div class="overview-label">Avg Revenue Growth</div>
        <div class="overview-value positive">42%</div>
      </div>
      <div class="overview-metric">
        <div class="overview-label">Total Market Cap</div>
        <div class="overview-value">$284B</div>
      </div>
      <div class="overview-metric">
        <div class="overview-label">Profitable</div>
        <div class="overview-value">8/11</div>
      </div>
      <div class="overview-metric">
        <div class="overview-label">Avg GAV</div>
        <div class="overview-value">1.2x</div>
      </div>
    </div>
  </section>

  <!-- Pane 2: Revenue Growth Trends -->
  <section class="frosted-pane">
    <h2 class="pane-title">Revenue Growth Trends</h2>
    <div class="chart-wrap">
      <canvas id="growthChart"></canvas>
    </div>
  </section>

  <!-- Pane 3: Growth Rankings -->
  <section class="frosted-pane">
    <h2 class="pane-title">Growth Rankings</h2>
    <div class="rankings-table" id="rankingsTable">
      <!-- Header -->
      <div class="th">Ticker</div>
      <div class="th">Company</div>
      <div class="th">Rev Growth</div>
      <div class="th">Market Cap</div>
      <div class="th">P/E</div>
      <div class="th">Verdict</div>
      <!-- Rows inserted by JS -->
    </div>
  </section>

</main>

<script>
(function() {
  // ─── Chart ───
  const ctx = document.getElementById('growthChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ["Q1'25", "Q2'25", "Q3'25", "Q4'25"],
      datasets: [
        {
          label: 'ALAB',
          data: [95, 100, 108, 113],
          borderColor: '#A0B8C8',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#A0B8C8',
          tension: 0.35
        },
        {
          label: 'CRDO',
          data: [60, 72, 82, 89],
          borderColor: '#8BA4B8',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#8BA4B8',
          tension: 0.35
        },
        {
          label: 'APP',
          data: [85, 78, 74, 71],
          borderColor: '#6B8BA4',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#6B8BA4',
          tension: 0.35
        },
        {
          label: 'PLTR',
          data: [29, 31, 34, 36],
          borderColor: '#4A5568',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#4A5568',
          tension: 0.35
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false
      },
      plugins: {
        legend: {
          position: 'top',
          align: 'end',
          labels: {
            color: '#7A8BA5',
            font: { family: 'Outfit', size: 12, weight: '400' },
            boxWidth: 12,
            boxHeight: 2,
            padding: 20,
            usePointStyle: false
          }
        },
        tooltip: {
          backgroundColor: 'rgba(12, 14, 20, 0.92)',
          titleColor: '#D6DCE5',
          bodyColor: '#D6DCE5',
          titleFont: { family: 'Outfit', weight: '600', size: 13 },
          bodyFont: { family: 'Outfit', weight: '400', size: 12 },
          borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 8,
          callbacks: {
            label: function(context) {
              return context.dataset.label + ': ' + context.parsed.y + '%';
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.06)', drawBorder: false },
          ticks: {
            color: '#7A8BA5',
            font: { family: 'Outfit', size: 12, weight: '400' }
          },
          border: { display: false }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.06)', drawBorder: false },
          ticks: {
            color: '#7A8BA5',
            font: { family: 'Outfit', size: 12, weight: '400' },
            callback: function(v) { return v + '%'; }
          },
          border: { display: false }
        }
      }
    }
  });

  // ─── Table ───
  const rows = [
    { ticker: 'ALAB', company: 'Astera Labs',  growth: '113%', cap: '$15B',  pe: '95x',  verdict: 'CAUTION' },
    { ticker: 'CRDO', company: 'Credo Tech',   growth: '89%',  cap: '$12B',  pe: '68x',  verdict: 'PASS' },
    { ticker: 'APP',  company: 'AppLovin',     growth: '74%',  cap: '$112B', pe: '52x',  verdict: 'PASS' },
    { ticker: 'UPST', company: 'Upstart',      growth: '56%',  cap: '$8B',   pe: '85x',  verdict: 'CAUTION' },
    { ticker: 'PLTR', company: 'Palantir',     growth: '36%',  cap: '$245B', pe: '180x', verdict: 'FAIL' },
    { ticker: 'TOST', company: 'Toast',        growth: '32%',  cap: '$18B',  pe: '72x',  verdict: 'PASS' },
    { ticker: 'DDOG', company: 'Datadog',      growth: '28%',  cap: '$42B',  pe: '65x',  verdict: 'PASS' },
    { ticker: 'AMD',  company: 'AMD',          growth: '18%',  cap: '$195B', pe: '28x',  verdict: 'PASS' }
  ];

  const table = document.getElementById('rankingsTable');

  rows.forEach(function(r) {
    const verdictClass = r.verdict === 'PASS' ? 'verdict-pass'
                       : r.verdict === 'CAUTION' ? 'verdict-caution'
                       : 'verdict-fail';

    const rowHTML =
      '<div class="row">' +
        '<div class="td ticker">' + r.ticker + '</div>' +
        '<div class="td company">' + r.company + '</div>' +
        '<div class="td growth">' + r.growth + '</div>' +
        '<div class="td">' + r.cap + '</div>' +
        '<div class="td">' + r.pe + '</div>' +
        '<div class="td"><span class="verdict-badge ' + verdictClass + '">' + r.verdict + '</span></div>' +
      '</div>';

    table.insertAdjacentHTML('beforeend', rowHTML);
  });
})();
</script>

</body>
</html>
