<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Dashboard</title>
  <link rel="stylesheet" href="/css/fonts.css?v=2">
  <link rel="stylesheet" href="/css/base.css?v=2">
  <link rel="stylesheet" href="/css/components.css?v=2">
  <link id="theme-stylesheet" rel="stylesheet" href="/css/themes/onyx.css?v=2">
  <link rel="stylesheet" href="/css/mobile.css?v=2">
  <script src="/vendor/chart.umd.min.js"></script>
</head>
<body class="theme-onyx">

  <!-- Top Navigation Bar -->
  <header id="app-header">
    <div class="header-left">
      <a href="/" class="home-link">&#8592; Home</a>
      <h1 class="app-title">PORTFOLIO VIZ</h1>
      <span class="header-meta" id="header-count"></span>
      <span class="header-meta role-chip" id="header-user" hidden></span>
    </div>
    <nav class="header-nav" id="main-nav">
      <a href="#summary" class="nav-link active" data-dashboard="summary" data-short="Sum">Summary</a>
      <a href="#growth" class="nav-link" data-dashboard="growth" data-short="Grw">Growth</a>
      <a href="#valuation" class="nav-link" data-dashboard="valuation" data-short="Val">Valuation</a>
      <a href="#profitability" class="nav-link" data-dashboard="profitability" data-short="Prof">Profitability</a>
      <a href="#deepdive" class="nav-link" data-dashboard="deepdive" data-short="Deep">Deep Dive</a>
      <a href="/family" class="nav-link nav-link-external" id="family-nav-link" hidden data-short="Fam">Family</a>
    </nav>
    <div class="header-right">
      <select id="theme-selector" title="Switch theme">
        <option value="onyx">Onyx</option>
        <option value="ivory-ink">Ivory Ink</option>
      </select>
      <button id="refresh-btn" title="Refresh data">&#8635;</button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main id="dashboard-content">
    <div class="loading-state" id="loading-indicator">
      <div class="loading-spinner"></div>
      <p>Loading portfolio data...</p>
    </div>
  </main>

  <!-- Scripts -->
  <script src="/js/utils/formatters.js?v=2"></script>
  <script src="/js/utils/colors.js?v=2"></script>
  <script src="/js/utils/chartDefaults.js?v=2"></script>
  <script src="/js/utils/outlierScale.js?v=2"></script>
  <script src="/js/api.js?v=2"></script>
  <script src="/js/themeManager.js?v=2"></script>
  <script src="/js/components/metricCard.js?v=2"></script>
  <script src="/js/components/sortableTable.js?v=2"></script>
  <script src="/js/components/barChart.js?v=2"></script>
  <script src="/js/components/lineChart.js?v=2"></script>
  <script src="/js/components/heatmap.js?v=2"></script>
  <script src="/js/components/scatterPlot.js?v=2"></script>
  <script src="/js/components/companySelector.js?v=2"></script>
  <script src="/js/components/peCompression.js?v=2"></script>
  <script src="/js/components/saulGrid.js?v=2"></script>
  <script src="/js/dashboards/liveSection.js?v=2"></script>
  <script src="/js/dashboards/summary.js?v=2"></script>
  <script src="/js/dashboards/growth.js?v=2"></script>
  <script src="/js/dashboards/valuation.js?v=2"></script>
  <script src="/js/dashboards/profitability.js?v=2"></script>
  <script src="/js/dashboards/deepDive.js?v=2"></script>
  <script src="/js/app.js?v=3"></script>
</body>
</html>
